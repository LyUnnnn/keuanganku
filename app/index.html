<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KeuanganKu">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <title>KeuanganKu — Input Laporan</title>
  <link rel="stylesheet" href="./fonts/fonts.css">
  <link rel="stylesheet" href="./css/style.css?v=1777632137">
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="app">

  <!-- Sidebar -->
  <div id="sidebar-container"></div>

  <!-- Main -->
  <main class="main" id="main-content">
    <div class="topbar">
      <button class="hamburger" aria-label="Menu">&#9776;</button>
      <span class="topbar-title" id="topbar-title">Input Transaksi</span>
      <div class="topbar-actions">
        <button class="btn-topbar" data-action="export">Export CSV</button>
        <button class="btn-topbar" data-action="settings">Pengaturan</button>
      </div>
    </div>

    <div class="content">
      <div class="install-banner" id="install-banner" style="display:none">
        <div class="install-banner-text">
          <div>Install sebagai aplikasi</div>
          <div class="install-banner-sub">Akses lebih cepat dari home screen</div>
        </div>
        <button class="btn-install" id="btn-install">Install</button>
      </div>

      <div class="panel active" id="panel-input"></div>
      <div class="panel" id="panel-saldo"></div>
      <div class="panel" id="panel-history"></div>
      <div class="panel" id="panel-utang"></div>
      <div class="panel" id="panel-settings"></div>
      <div class="panel" id="panel-about"></div>
    </div>
  </main>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="./lib/idb.js?v=1777632137"></script>
<script src="./js/db.js?v=1777632137"></script>
<script src="./js/api.js?v=1777632137"></script>
<script src="./js/saldo.js?v=1777632137"></script>
<script src="./js/ui.js?v=1777632137"></script>
<script src="./js/auth.js?v=1777632137"></script>
<script src="./js/init.js?v=1777632137"></script>
</body>
</html>
