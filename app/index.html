<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KeuanganKu">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <title>KeuanganKu — Input Laporan</title>
  <link rel="stylesheet" href="./fonts/fonts.css">
  <link rel="stylesheet" href="./css/style.css?v=1777303711">
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a class="logo" href="#">
        <div class="logo-icon"><img src="./favicon.svg" alt="Logo"></div>
        <div>
          <div class="logo-text">KeuanganKu</div>
          <div class="logo-sub">Laporan Keuangan</div>
        </div>
      </a>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">Utama</div>
      <div class="nav-item active" data-panel="input">
        Input Transaksi
        <span class="nav-badge" id="badge-queue" style="display:none">0</span>
      </div>
      <div class="nav-item saldo-panel-link" data-panel="saldo">
        Saldo &amp; Ringkasan
      </div>
      <div class="nav-item" data-panel="history">
        Riwayat Lokal
      </div>
      <div class="nav-section">Sistem</div>
      <div class="nav-item" data-panel="settings">
        Pengaturan
      </div>
      <div class="nav-item" data-panel="about">
        Panduan
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sheets-status" id="sheets-status">
        <div class="status-dot" id="status-dot"></div>
        <div class="status-text">
          <div class="status-label">Google Sheets</div>
          <div class="status-value" id="status-value">Belum terhubung</div>
        </div>
        <span id="status-icon" style="font-size:11px;color:var(--text3);font-weight:600">OK</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main-content">
    <div class="topbar">
      <button class="hamburger" aria-label="Menu">&#9776;</button>
      <span class="topbar-title" id="topbar-title">Input Transaksi</span>
      <div class="topbar-actions">
        <button class="btn-topbar" data-action="export">Export CSV</button>
        <button class="btn-topbar" data-action="settings">Pengaturan</button>
      </div>
    </div>

    <div class="content">
      <div class="install-banner" id="install-banner" style="display:none">
        <div class="install-banner-text">
          <div>Install sebagai aplikasi</div>
          <div class="install-banner-sub">Akses lebih cepat dari home screen</div>
        </div>
        <button class="btn-install" id="btn-install">Install</button>
      </div>

      <div class="panel active" id="panel-input"></div>
      <div class="panel" id="panel-saldo"></div>
      <div class="panel" id="panel-history"></div>
      <div class="panel" id="panel-settings"></div>
      <div class="panel" id="panel-about"></div>
    </div>
  </main>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="./lib/idb.js?v=1777303711"></script>
<script src="./js/db.js?v=1777303711"></script>
<script src="./js/api.js?v=1777303711"></script>
<script src="./js/saldo.js?v=1777303711"></script>
<script src="./js/ui.js?v=1777303711"></script>
<script src="./js/auth.js?v=1777303711"></script>
<script src="./js/init.js?v=1777303711"></script>
</body>
</html>
